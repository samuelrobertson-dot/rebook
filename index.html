<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rebook</title>
<script src="https://accounts.google.com/gsi/client"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:Google Sans,Arial,sans-serif;background:#f8f9fa;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;}
  .card{background:#fff;border-radius:12px;padding:32px;width:400px;box-shadow:0 4px 24px rgba(0,0,0,0.12);}
  h2{font-size:20px;color:#202124;margin-bottom:24px;display:flex;align-items:center;gap:8px;}
  label{display:block;font-size:13px;color:#5f6368;margin-bottom:16px;}
  label span{display:block;margin-bottom:6px;}
  input,select{width:100%;padding:9px 12px;border:1px solid #dadce0;border-radius:6px;font-size:14px;color:#202124;outline:none;transition:border 0.2s;}
  input:focus,select:focus{border-color:#1a73e8;}
  .attendees{font-size:12px;color:#5f6368;margin-top:4px;min-height:16px;}
  .actions{display:flex;justify-content:flex-end;gap:12px;margin-top:24px;}
  button{padding:9px 22px;border-radius:6px;font-size:14px;cursor:pointer;border:none;}
  .btn-cancel{background:#fff;border:1px solid #dadce0;color:#5f6368;}
  .btn-book{background:#1a73e8;color:#fff;}
  .btn-book:hover{background:#1557b0;}
  .btn-book:disabled{background:#ccc;cursor:not-allowed;}
  .status{font-size:13px;color:#5f6368;margin-top:16px;min-height:20px;text-align:center;}
  .success{color:#188038;font-size:15px;text-align:center;padding:16px 0;}
  .conflict-box{background:#fef7e0;border:1px solid #f9ab00;border-radius:6px;padding:14px;font-size:13px;color:#7a4f00;margin-bottom:16px;display:none;}
  .conflict-box strong{display:block;margin-bottom:10px;}
  .suggestions{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;}
  .suggestion-btn{padding:6px 14px;border-radius:20px;border:1px solid #f9ab00;background:#fff8e1;color:#7a4f00;font-size:13px;cursor:pointer;transition:all 0.15s;}
  .suggestion-btn:hover{background:#f9ab00;color:#fff;}
  .suggestion-btn.selected{background:#f9ab00;color:#fff;}
  .no-slots{font-size:13px;color:#c5221f;margin-top:8px;}
  .auth-badge{font-size:11px;color:#188038;text-align:right;margin-bottom:12px;}
  .day-label{font-size:12px;color:#5f6368;margin-top:10px;margin-bottom:4px;font-weight:500;}
</style>
</head>
<body>
<div class="card">
  <h2>📅 Rebook Appointment</h2>
  <div class="auth-badge" id="auth-badge"></div>
  <div class="conflict-box" id="conflict-box">
    <strong id="conflict-msg"></strong>
    <div>Available times:</div>
    <div class="suggestions" id="suggestions"></div>
    <div class="no-slots" id="no-slots" style="display:none">No free slots found in the next 2 days within your bookable hours.</div>
  </div>
  <div id="form-area">
    <label><span>Event title</span>
      <input type="text" id="rb-title" placeholder="e.g. Coaching Call">
    </label>
    <label><span>Weeks ahead</span>
      <select id="rb-weeks">
        <option value="1">1 week</option>
        <option value="2">2 weeks</option>
        <option value="4" selected>4 weeks</option>
        <option value="6">6 weeks</option>
      </select>
    </label>
    <label><span>Time</span>
      <select id="rb-time"></select>
    </label>
    <label><span>Duration</span>
      <select id="rb-duration">
        <option value="20">20 minutes</option>
        <option value="30" selected>30 minutes</option>
        <option value="45">45 minutes</option>
        <option value="60">1 hour</option>
        <option value="90">1 hour 30 minutes</option>
      </select>
    </label>
    <div class="attendees" id="attendee-display"></div>
    <div class="actions">
      <button class="btn-cancel" onclick="window.close()">Cancel</button>
      <button class="btn-book" id="btn-book" onclick="handleBook()">Book</button>
    </div>
  </div>
  <div class="status" id="status"></div>
</div>

<script>
const CLIENT_ID = '669523312108-ghhj12obk8qtvggc4hsfpau6fmr55q6n.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/calendar';
const STORAGE_KEY = 'rebook_token';
const BOOKABLE_START = { h: 9, m: 0 };
const BOOKABLE_END = { h: 15, m: 30 };
const COLOR_ID = '5'; // Banana — matches "Member Call" category
let accessToken = null;
let pendingEvent = null;

function getParams() {
  const p = new URLSearchParams(window.location.search);
  const now = new Date();
  return {
    title: p.get('title') || '',
    hours: parseInt(p.get('hours')) || 9,
    minutes: parseInt(p.get('minutes')) || 0,
    attendees: p.get('attendees') ? p.get('attendees').split(',').filter(Boolean) : [],
    year: parseInt(p.get('year')) || now.getFullYear(),
    month: parseInt(p.get('month')) || now.getMonth(),
    day: parseInt(p.get('day')) || now.getDate()
  };
}

function buildTimeOptions(defaultHours, defaultMinutes) {
  const sel = document.getElementById('rb-time');
  let bestMatch = null;
  let bestDiff = Infinity;
  const opts = [];
  for (let h = 7; h <= 19; h++) {
    for (let m of [0, 30]) {
      const diff = Math.abs((h * 60 + m) - (defaultHours * 60 + defaultMinutes));
      if (diff < bestDiff) { bestDiff = diff; bestMatch = h + ':' + m; }
      const label = (h % 12 || 12) + ':' + (m === 0 ? '00' : '30') + ' ' + (h < 12 ? 'AM' : 'PM');
      const opt = document.createElement('option');
      opt.value = h + ':' + m;
      opt.textContent = label;
      opts.push(opt);
    }
  }
  opts.forEach(function(opt) {
    if (opt.value === bestMatch) opt.selected = true;
    sel.appendChild(opt);
  });
}

function init() {
  const params = getParams();
  document.getElementById('rb-title').value = params.title;
  buildTimeOptions(params.hours, params.minutes);
  if (params.attendees.length > 0) {
    document.getElementById('attendee-display').textContent = '👤 ' + params.attendees.join(', ');
  }
  const cached = localStorage.getItem(STORAGE_KEY);
  if (cached) {
    try {
      const parsed = JSON.parse(cached);
      if (parsed.expiry > Date.now()) {
        accessToken = parsed.token;
        document.getElementById('auth-badge').textContent = '🔒 Authorised';
        return;
      }
    } catch(e) {}
  }
  authenticate();
}

// FIX A (Part 1): Fetch the calendar owner's email so we can mark self as accepted
function getCalendarEmail(callback) {
  fetch('https://www.googleapis.com/calendar/v3/calendars/primary', {
    headers: { 'Authorization': 'Bearer ' + accessToken }
  })
  .then(function(r) { return r.json(); })
  .then(function(data) { callback(data.id); })
  .catch(function() { callback(null); });
}

// FIX A (Part 2): Build the event object with self-acceptance and colorId
function buildEvent(title, target, end, attendees, selfEmail) {
  const attendeeList = attendees.map(function(e) { return { email: e }; });
  if (selfEmail) {
    attendeeList.push({ email: selfEmail, self: true, responseStatus: 'accepted' });
  }
  return {
    summary: title,
    start: { dateTime: target.toISOString() },
    end: { dateTime: end.toISOString() },
    attendees: attendeeList,
    colorId: COLOR_ID,
    conferenceData: { createRequest: { requestId: Math.random().toString(36).substr(2, 9) } }
  };
}

function authenticate() {
  setStatus('Authorising...');
  google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: function(resp) {
      if (resp.error) { setStatus('Auth error: ' + resp.error); return; }
      accessToken = resp.access_token;
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        token: accessToken,
        expiry: Date.now() + (55 * 60 * 1000)
      }));
      document.getElementById('auth-badge').textContent = '🔒 Authorised';
      setStatus('');
      if (pendingEvent) {
        if (pendingEvent._needsEmail) {
          // FIX B + FIX A: After auth, resolve email then run full check (not direct submit)
          const { title, target, end, duration, params } = pendingEvent;
          getCalendarEmail(function(selfEmail) {
            const event = buildEvent(title, target, end, params.attendees, selfEmail);
            pendingEvent = event;
            checkAndBook(event, target, end, duration);
          });
        } else {
          // FIX B: Route through checkAndBook, not submitEvent
          const { target, end, duration } = getTargetDate();
          checkAndBook(pendingEvent, target, end, duration);
        }
      }
    }
  }).requestAccessToken();
}

function getTargetDate() {
  const params = getParams();
  const weeks = parseInt(document.getElementById('rb-weeks').value);
  const timeParts = document.getElementById('rb-time').value.split(':');
  const hours = parseInt(timeParts[0]);
  const mins = parseInt(timeParts[1]);
  const duration = parseInt(document.getElementById('rb-duration').value);
  const base = new Date(params.year, params.month, params.day);
  base.setDate(base.getDate() + (weeks * 7));
  base.setHours(hours, mins, 0, 0);
  const end = new Date(base.getTime() + duration * 60 * 1000);
  return { target: base, end, duration };
}

// FIX A (Part 3) + FIX B: handleBook now fetches email before building event,
// and stores _needsEmail placeholder if auth is required
function handleBook() {
  const title = document.getElementById('rb-title').value.trim();
  if (!title) { setStatus('Please enter a title.'); return; }
  const { target, end, duration } = getTargetDate();
  const params = getParams();

  document.getElementById('btn-book').disabled = true;
  document.getElementById('conflict-box').style.display = 'none';
  setStatus('Checking availability...');

  if (!accessToken) {
    // Store enough to rebuild the event after auth, flagged for email resolution
    pendingEvent = { _needsEmail: true, title, target, end, duration, params };
    authenticate();
    return;
  }

  getCalendarEmail(function(selfEmail) {
    const event = buildEvent(title, target, end, params.attendees, selfEmail);
    pendingEvent = event;
    checkAndBook(event, target, end, duration);
  });
}

function checkAndBook(event, target, end, duration) {
  const headers = { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' };
  fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?timeMin='
    + target.toISOString() + '&timeMax=' + end.toISOString() + '&singleEvents=true', { headers: headers })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error && data.error.code === 401) {
      localStorage.removeItem(STORAGE_KEY);
      accessToken = null;
      authenticate();
      return;
    }
    const conflicts = (data.items || []).filter(function(e) { return e.status !== 'cancelled'; });
    if (conflicts.length > 0) {
      const names = conflicts.map(function(e) { return e.summary; }).join(', ');
      showConflict(names, target, duration, event);
      return;
    }
    submitEvent(event);
  })
  .catch(function(e) {
    setStatus('Error: ' + e.message);
    document.getElementById('btn-book').disabled = false;
  });
}

function showConflict(conflictNames, targetDate, duration, originalEvent) {
  setStatus('');
  document.getElementById('conflict-msg').textContent = '⚠️ "' + conflictNames + '" is already booked at this time.';
  document.getElementById('suggestions').innerHTML = '';
  document.getElementById('no-slots').style.display = 'none';
  document.getElementById('conflict-box').style.display = 'block';
  document.getElementById('btn-book').disabled = false;
  findFreeSlots(targetDate, duration, originalEvent);
}

function findFreeSlots(targetDate, duration, originalEvent) {
  const headers = { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' };
  const day1 = new Date(targetDate);
  day1.setHours(0, 0, 0, 0);
  const day2 = new Date(day1);
  day2.setDate(day2.getDate() + 1);
  const searchEnd = new Date(day2);
  searchEnd.setHours(23, 59, 59, 0);

  fetch('https://www.googleapis.com/calendar/v3/freeBusy', {
    method: 'POST',
    headers: headers,
    body: JSON.stringify({
      timeMin: day1.toISOString(),
      timeMax: searchEnd.toISOString(),
      items: [{ id: 'primary' }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.error) { setStatus('Could not fetch availability.'); return; }
    const busy = (data.calendars.primary.busy || []).map(function(b) {
      return { start: new Date(b.start), end: new Date(b.end) };
    });
    const slots = getFreeSlots(busy, day1, day2, duration, targetDate);
    renderSuggestions(slots, duration, originalEvent);
  })
  .catch(function(e) { setStatus('Error fetching availability: ' + e.message); });
}

function getFreeSlots(busyPeriods, day1, day2, duration, originalTarget) {
  const slots = [];
  const days = [day1, day2];
  const targetDateStr = originalTarget.toDateString();

  for (let d = 0; d < days.length; d++) {
    if (slots.length >= 5) break;
    const daySlots = [];
    const day = days[d];
    let slotStart = new Date(day);
    slotStart.setHours(BOOKABLE_START.h, BOOKABLE_START.m, 0, 0);
    const dayEnd = new Date(day);
    dayEnd.setHours(BOOKABLE_END.h, BOOKABLE_END.m, 0, 0);

    while (slotStart < dayEnd && daySlots.length < 8) {
      const slotEnd = new Date(slotStart.getTime() + duration * 60 * 1000);
      if (slotEnd > dayEnd) break;

      if (slotStart.toDateString() === targetDateStr &&
          slotStart.getHours() === originalTarget.getHours() &&
          slotStart.getMinutes() === originalTarget.getMinutes()) {
        slotStart = new Date(slotStart.getTime() + 30 * 60 * 1000);
        continue;
      }

      const isBusy = busyPeriods.some(function(b) {
        return slotStart < b.end && slotEnd > b.start;
      });

      if (!isBusy) daySlots.push(new Date(slotStart));
      slotStart = new Date(slotStart.getTime() + 30 * 60 * 1000);
    }

    if (daySlots.length > 0) {
      slots.push({ day: new Date(day), times: daySlots.slice(0, 5) });
    }
    if (slots.length > 0 && d === 0) break;
  }
  return slots;
}

function renderSuggestions(slotGroups, duration, originalEvent) {
  const container = document.getElementById('suggestions');
  container.innerHTML = '';

  if (slotGroups.length === 0) {
    document.getElementById('no-slots').style.display = 'block';
    return;
  }

  const params = getParams();

  slotGroups.forEach(function(group) {
    const dayLabel = document.createElement('div');
    dayLabel.className = 'day-label';
    const isToday = group.day.toDateString() === new Date().toDateString();
    dayLabel.textContent = isToday ? 'Today' : group.day.toLocaleDateString('en-AU', { weekday: 'long', month: 'short', day: 'numeric' });
    container.appendChild(dayLabel);

    const row = document.createElement('div');
    row.className = 'suggestions';
    container.appendChild(row);

    group.times.forEach(function(slot) {
      const btn = document.createElement('button');
      btn.className = 'suggestion-btn';
      btn.textContent = slot.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit', hour12: true });
      btn.onclick = function() {
        document.querySelectorAll('.suggestion-btn').forEach(function(b) { b.classList.remove('selected'); });
        btn.classList.add('selected');
        const slotEnd = new Date(slot.getTime() + duration * 60 * 1000);
        // FIX A: Use buildEvent for suggestion bookings too (self-accept + colorId)
        getCalendarEmail(function(selfEmail) {
          const newEvent = buildEvent(originalEvent.summary, slot, slotEnd, params.attendees, selfEmail);
          setStatus('');
          submitEvent(newEvent);
        });
      };
      row.appendChild(btn);
    });
  });
}

function submitEvent(event) {
  const headers = { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' };
  setStatus('Creating event...');
  document.getElementById('btn-book').disabled = true;
  fetch('https://www.googleapis.com/calendar/v3/calendars/primary/events?conferenceDataVersion=1', {
    method: 'POST', headers: headers, body: JSON.stringify(event)
  })
  .then(function(r) { return r.json(); })
  .then(function(ev) {
    if (ev.error) {
      setStatus('Error: ' + ev.error.message);
      document.getElementById('btn-book').disabled = false;
      return;
    }
    document.getElementById('form-area').innerHTML =
      '<div class="success">' +
      '✅ Booked!<br><br>' +
      '<strong>' + ev.summary + '</strong><br><br>' +
      (ev.hangoutLink ? '🎥 <a href="' + ev.hangoutLink + '" target="_blank">Meet link</a><br><br>' : '') +
      '<small>' + new Date(ev.start.dateTime).toLocaleString('en-AU') + '</small>' +
      '</div>';
    document.getElementById('conflict-box').style.display = 'none';
  })
  .catch(function(e) {
    setStatus('Error: ' + e.message);
    document.getElementById('btn-book').disabled = false;
  });
}

function setStatus(msg) { document.getElementById('status').textContent = msg; }

window.onload = init;
</script>
</body>
</html>
